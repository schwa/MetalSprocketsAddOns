# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift
on:
  push:
  pull_request:
jobs:
  swift-build-26:
    env:
      XCODE_VERSION: "26.2"
    runs-on: "macos-26"
    steps:
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download MetalToolchain
        run: xcodebuild -downloadComponent MetalToolchain
      - name: Trust plugins
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
      - run: swift build -v --disable-sandbox
      - name: Run tests
        id: tests
        run: swift test -v --disable-sandbox
      - name: Collect golden image mismatches
        if: always()
        run: |
          mkdir -p /tmp/golden-artifacts
          # /tmp/<name>.png — written when an existing golden mismatches
          shopt -s nullglob
          for f in /tmp/*.png; do cp "$f" /tmp/golden-artifacts/ 2>/dev/null || true; done
          # $TMPDIR/GoldenImages/<name>.png — written when a golden is missing
          if [ -n "$TMPDIR" ] && [ -d "$TMPDIR/GoldenImages" ]; then
            cp "$TMPDIR"/GoldenImages/*.png /tmp/golden-artifacts/ 2>/dev/null || true
          fi
          echo "Collected files:"
          ls -la /tmp/golden-artifacts/ || true
        shell: bash
      - name: Upload golden image mismatches
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: golden-image-mismatches
          path: /tmp/golden-artifacts/
          if-no-files-found: ignore
          retention-days: 14

  swiftlint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: brew install swiftlint
      - run: swiftlint --strict
